<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Presentation Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#000;color:#fff;font-family:Arial;overflow:hidden}
.screen{position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:#000}
#intro,#player,#menu{display:flex}
video,img{width:100vw;height:100vh;object-fit:contain;background:#000}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);font-size:2rem;font-weight:bold;cursor:pointer}
#menu{flex-direction:column;gap:15px}
button{padding:15px 30px;font-size:20px;border-radius:10px;border:none;cursor:pointer}
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;gap:10px}
</style></head>
<body>
<div id="intro" class="screen">
<video id="video" playsinline disablepictureinpicture controlslist="nodownload nofullscreen noremoteplayback"></video>
<div id="overlay">Click Anywhere To Start</div>
</div>

<div id="menu" class="screen">
<h1>Choose Presentation</h1>
<button onclick="startPresentation('history')">History</button>
<button onclick="startPresentation('science')">Science</button>
</div>

<div id="player" class="screen" style="display:none">
<img id="slide">
<div id="controls">
<button onclick="prev()">◀ Previous</button>
<button onclick="home()">🏠 Home</button>
<button onclick="next()">Next ▶</button>
</div>
</div>

<audio id="bgm" src="launcher/bgm.mp3" loop></audio>

<script>
const presentations={
 history:{intro:"presentations/history/intro.mp4",slides:[
"presentations/history/slides/1.png",
"presentations/history/slides/2.png",
"presentations/history/slides/3.png"]},
 science:{intro:"presentations/science/intro.mp4",slides:[
"presentations/science/slides/1.png",
"presentations/science/slides/2.png"]}
};
const launcherIntro="launcher/intro.mp4";
let mode="launcher",currentPres=null,idx=0,startX=0;
const intro=document.getElementById("intro"),menu=document.getElementById("menu"),player=document.getElementById("player"),video=document.getElementById("video"),overlay=document.getElementById("overlay"),slide=document.getElementById("slide"),controls=document.getElementById("controls"),bgm=document.getElementById("bgm");
function showIntro(src){intro.style.display="flex";menu.style.display="none";player.style.display="none";controls.style.display="none";overlay.style.display="flex";video.src=src;video.load();}
showIntro(launcherIntro);
overlay.onclick=()=>{overlay.style.display="none";video.play();}
video.onpause=()=>{if(!video.ended)video.play();}
video.onended=()=>{
 intro.style.display="none";
 if(mode==="launcher"){menu.style.display="flex";bgm.play().catch(()=>{});}
 else{player.style.display="flex";controls.style.display="flex";idx=0;update();}
}
function startPresentation(id){bgm.pause();mode="presentation";currentPres=id;showIntro(presentations[id].intro);}
function update(){slide.src=presentations[currentPres].slides[idx]}
function next(){if(idx<presentations[currentPres].slides.length-1){idx++;update();}}
function prev(){if(idx>0){idx--;update();}}
function home(){mode="launcher";showIntro(launcherIntro);}
document.addEventListener("keydown",e=>{if(player.style.display!=="none"){if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();}});
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{if(player.style.display==="none")return;let d=e.changedTouches[0].clientX-startX;if(d>50)prev();if(d<-50)next();});
</script>
</body></html>
